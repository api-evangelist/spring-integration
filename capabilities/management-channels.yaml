naftiko: 1.0.0-alpha2
info:
  label: Spring Integration Management API — Channels
  description: 'Spring Integration Management API — Channels. 2 operations. Lead operation: List All Message Channels. Self-contained
    Naftiko capability covering one Spring Integration business surface.'
  tags:
  - Spring Integration
  - Channels
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SPRING_INTEGRATION_API_KEY: SPRING_INTEGRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: management-channels
    baseUri: http://localhost:8080/api
    description: Spring Integration Management API — Channels business capability. Self-contained, no shared references.
    resources:
    - name: channels
      path: /channels
      operations:
      - name: listchannels
        method: GET
        description: List All Message Channels
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page
          in: query
          type: integer
        - name: size
          in: query
          type: integer
    - name: channels-name
      path: /channels/{name}
      operations:
      - name: getchannel
        method: GET
        description: Get Channel Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: Channel bean name
          required: true
  exposes:
  - type: rest
    namespace: management-channels-rest
    port: 8080
    description: REST adapter for Spring Integration Management API — Channels. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/channels
      name: channels
      description: REST surface for channels.
      operations:
      - method: GET
        name: listchannels
        description: List All Message Channels
        call: management-channels.listchannels
        with:
          page: rest.page
          size: rest.size
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/channels/{name}
      name: channels-name
      description: REST surface for channels-name.
      operations:
      - method: GET
        name: getchannel
        description: Get Channel Details
        call: management-channels.getchannel
        with:
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: management-channels-mcp
    port: 9090
    transport: http
    description: MCP adapter for Spring Integration Management API — Channels. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-all-message-channels
      description: List All Message Channels
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: management-channels.listchannels
      with:
        page: tools.page
        size: tools.size
      outputParameters:
      - type: object
        mapping: $.
    - name: get-channel-details
      description: Get Channel Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: management-channels.getchannel
      with:
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
