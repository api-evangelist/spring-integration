naftiko: 1.0.0-alpha2
info:
  label: Spring Integration Management API — Control
  description: 'Spring Integration Management API — Control. 1 operations. Lead operation: Send Control Bus Command. Self-contained
    Naftiko capability covering one Spring Integration business surface.'
  tags:
  - Spring Integration
  - Control
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SPRING_INTEGRATION_API_KEY: SPRING_INTEGRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: management-control
    baseUri: http://localhost:8080/api
    description: Spring Integration Management API — Control business capability. Self-contained, no shared references.
    resources:
    - name: controlBus
      path: /controlBus
      operations:
      - name: sendcontrolbuscommand
        method: POST
        description: Send Control Bus Command
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: management-control-rest
    port: 8080
    description: REST adapter for Spring Integration Management API — Control. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/controlbus
      name: controlbus
      description: REST surface for controlBus.
      operations:
      - method: POST
        name: sendcontrolbuscommand
        description: Send Control Bus Command
        call: management-control.sendcontrolbuscommand
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: management-control-mcp
    port: 9090
    transport: http
    description: MCP adapter for Spring Integration Management API — Control. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: send-control-bus-command
      description: Send Control Bus Command
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: management-control.sendcontrolbuscommand
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
